<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IIC-Metaverse | Admin Login</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- FontAwesome Icon Library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Premium Visual Design System matching Metaverse admin panel */
    :root {
      --bg-dark: #07080c;
      --bg-card: rgba(15, 17, 26, 0.65);
      --bg-input: rgba(8, 9, 15, 0.85);
      --border-color: rgba(255, 255, 255, 0.06);
      --border-focus: #DFD800;
      --text-main: #f3f4f6;
      --text-muted: #858e9c;

      --accent-yellow: #DFD800;
      --accent-orange: #EE7C2C;
      --brand-gradient: linear-gradient(100.67deg, #DFD800 0%, #EE7C2C 100%);
      --brand-glow: rgba(223, 216, 0, 0.22);
      --accent-red: #ef4444;
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      --font-sans: 'Outfit', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background Glowing Orbs */
    .background-decor {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.15;
      animation: float 20s infinite alternate ease-in-out;
    }

    .orb-1 {
      top: -10%;
      right: 10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, var(--accent-yellow), var(--accent-orange));
    }

    .orb-2 {
      bottom: -10%;
      left: 5%;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, var(--accent-orange), var(--bg-dark));
      animation-delay: -5s;
    }

    @keyframes float {
      0% {
        transform: translateY(0) scale(1);
      }

      100% {
        transform: translateY(30px) scale(1.05);
      }
    }

    /* Login Card Glassmorphism */
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      perspective: 1000px;
    }

    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 45px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      text-align: center;
      position: relative;
      transition: var(--transition);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .login-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 25px 70px rgba(223, 216, 0, 0.03),
        0 20px 60px rgba(0, 0, 0, 0.6);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo Branding */
    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
    }

    .brand-logo img {
      height: 50px;
      filter: drop-shadow(0 0 15px rgba(223, 216, 0, 0.25));
    }

    .login-header h2 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #ffffff, #a2b0c5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 35px;
    }

    /* Form Fields */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 22px;
      text-align: left;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      padding-left: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      color: var(--text-muted);
      font-size: 1.05rem;
      transition: var(--transition);
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      background-color: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 15px 46px 15px 46px;
      color: #ffffff;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition);
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      left: auto !important;
      color: var(--text-muted);
      font-size: 1.05rem;
      cursor: pointer;
      pointer-events: auto !important;
      transition: var(--transition);
      user-select: none;
      z-index: 2;
    }

    .toggle-password:hover {
      color: var(--accent-yellow);
    }

    .input-wrapper input::placeholder {
      color: rgba(133, 142, 156, 0.5);
    }

    /* Focus Transitions */
    .input-wrapper input:focus {
      border-color: var(--border-focus);
      background-color: rgba(7, 8, 12, 0.92);
      box-shadow: 0 0 15px rgba(223, 216, 0, 0.08);
    }

    .input-wrapper input:focus+i {
      color: var(--accent-yellow);
    }

    /* Error Alert */
    .error-alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--accent-red);
      color: #ff8b8b;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 0.88rem;
      margin-bottom: 25px;
      display: none;
      align-items: center;
      gap: 12px;
      text-align: left;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Action Buttons */
    .btn-login {
      width: 100%;
      background: var(--brand-gradient);
      color: #05060a;
      border: none;
      padding: 16px;
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 1rem;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 25px rgba(238, 124, 44, 0.22);
      transition: var(--transition);
    }

    .btn-login:hover {
      box-shadow: 0 10px 30px rgba(238, 124, 44, 0.4);
      transform: translateY(-2px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(5, 6, 10, 0.25);
      border-top-color: #05060a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .footer-note {
      margin-top: 30px;
      font-size: 0.78rem;
      color: rgba(133, 142, 156, 0.4);
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>

  <!-- Background Decorative Glowing Orbs -->
  <div class="background-decor">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="brand-logo">
        <img src="/uploads/logo.svg" alt="IIC-Metaverse Logo" onerror="this.style.display='none'">
      </div>

      <div class="login-header">
        <!-- <h2>Ecosystem Console</h2> -->
        <p>Sign in to access control configurations</p>
      </div>

      <div id="errorMessage" class="error-alert">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="errorText">Invalid credentials provided.</span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Admin Email</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="admin@metaverse.in" required autocomplete="username">
            <i class="fa-solid fa-envelope"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Security Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="••••••••••••" required autocomplete="current-password">
            <i class="fa-solid fa-lock"></i>
            <i class="fa-solid fa-eye-slash toggle-password" id="togglePassword"></i>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-login">
          <span>Authenticate Session</span>
          <span class="spinner" id="btnSpinner"></span>
        </button>
      </form>

      <div class="footer-note">
        IIC-METAVERSE SECURE &bull; AUTH REQUIRED
      </div>
    </div>
  </div>

  <script>
    // Automatically redirect to home if already authenticated
    if (localStorage.getItem('adminToken')) {
      window.location.href = '/admin-home.html';
    }

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const errorAlert = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');

    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    if (togglePassword && passwordInput) {
      togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        togglePassword.classList.toggle('fa-eye');
        togglePassword.classList.toggle('fa-eye-slash');
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Reset error state
      errorAlert.style.display = 'none';

      // Loading state
      submitBtn.disabled = true;
      btnSpinner.style.display = 'inline-block';
      submitBtn.querySelector('span').textContent = 'Authenticating...';

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Store token in LocalStorage
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminEmail', data.admin.email);

          // Smooth redirect
          window.location.href = '/admin-home.html';
        } else {
          // Display error
          errorAlert.style.display = 'flex';
          errorText.textContent = data.error || 'Authentication failed. Please verify credentials.';
        }
      } catch (err) {
        console.error('Login request error:', err);
        errorAlert.style.display = 'flex';
        errorText.textContent = 'Server is unreachable. Please check backend status.';
      } finally {
        // Reset loading state
        submitBtn.disabled = false;
        btnSpinner.style.display = 'none';
        submitBtn.querySelector('span').textContent = 'Authenticate Session';
      }
    });
  </script>
</body>

</html>
